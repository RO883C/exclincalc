name: Sync Medical References

# 每月 1 日台灣時間 08:00 自動執行（ADA 每年 1 月更新）
on:
  schedule:
    - cron: '0 0 1 * *'   # UTC 00:00 = 台灣 08:00，每月 1 日
  workflow_dispatch:       # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check for reference updates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/sync-references.mjs

      - name: Notify on failure
        if: failure()
        run: echo "Reference sync failed - check logs"
