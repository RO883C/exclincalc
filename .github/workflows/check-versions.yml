name: Check Clinical Reference Versions

# 每月 1 日 08:30 台灣時間執行（sync-references 之後 30 分鐘）
on:
  schedule:
    - cron: '30 0 1 * *'   # UTC 00:30 = 台灣 08:30
  workflow_dispatch:         # 允許手動觸發

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check clinical guideline versions
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/check-versions.mjs

      - name: Notify on new versions found
        if: failure()
        run: echo "Version check failed - check logs"
